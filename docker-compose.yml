services:
  lead-scoring:
    build: ./services/lead-scoring
    env_file: .env
    ports:
      - "5001:5001"
    restart: unless-stopped

  property-search:
    build: ./services/property-search
    env_file: .env
    ports:
      - "5002:5002"
    restart: unless-stopped

  property-valuation:
    build: ./services/property-valuation
    env_file: .env
    ports:
      - "5003:5003"
    restart: unless-stopped

  email-marketing:
    build: ./services/email-marketing
    env_file: .env
    ports:
      - "5004:5004"
    restart: unless-stopped

  dashboard-analytics:
    build: ./services/dashboard-analytics
    env_file: .env
    ports:
      - "5005:5005"
    restart: unless-stopped

  data-collection:
    build: ./services/data-collection
    env_file: .env
    ports:
      - "5006:5006"
    restart: unless-stopped

  web:
    build: ./services/web-interface
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    env_file: .env
    ports:
      - "5678:5678"
    restart: unless-stopped
